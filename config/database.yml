default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("DB_USERNAME") { "postgres" } %>
  password: <%= ENV.fetch("DB_PASSWORD") { "" } %>
  host: <%= ENV.fetch("DB_HOST") { "127.0.0.1" } %>

development:
  <<: *default
  database: mini_jira_development

test:
  <<: *default
  database: mini_jira_test

production:
  primary: &primary_production
    <<: *default
    database: mini_jira_production
    username: <%= ENV.fetch("DB_USERNAME") { "mini_jira" } %>
    password: <%= ENV["MINI_JIRA_DATABASE_PASSWORD"] || ENV["DB_PASSWORD"] %>
    host: <%= ENV.fetch("DB_HOST") { "127.0.0.1" } %>

  cache:
    <<: *primary_production
    database: mini_jira_production_cache
    migrations_paths: db/cache_migrate

  queue:
    <<: *primary_production
    database: mini_jira_production_queue
    migrations_paths: db/queue_migrate

  cable:
    <<: *primary_production
    database: mini_jira_production_cable
    migrations_paths: db/cable_migrate
