name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      MYSQL_ROOT_PASSWORD: password
      DB_PASSWORD: password
      RAILS_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build test image
        run: docker compose build test

      - name: Check Chromium
        run: |
          docker compose run --rm test chromium --version
          docker compose run --rm test chromium \
            --headless=new \
            --no-sandbox \
            --disable-dev-shm-usage \
            --disable-gpu \
            --dump-dom about:blank

      - name: Run CI
        run: docker compose run --rm test bin/ci