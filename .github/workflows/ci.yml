name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      MYSQL_ROOT_PASSWORD: password
      DB_PASSWORD: password
      RAILS_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build test image
        run: docker compose build test

      - name: Run CI
        run: docker compose run --rm test bin/ci